  { "name": "Veg Noodles", "price": 120, "rating": 3.5, "image": "noodels/veg_noodles.webp" }
];

function displayFoods(foods) {
  const gallery = document.getElementById('food-gallery');
  gallery.innerHTML = "";
  foods.forEach(food => {
    gallery.innerHTML += `
      <div class="food-card">
        <img src="${food.image}" alt="${food.name}">
        <div class="card-row">
          <span class="food-name">${food.name}</span>
          <span class="food-price">₹${food.price}</span>
        </div>
        <div class="card-row">
          <span class="food-rating">⭐ ${food.rating}</span>
          <button class="order-btn">Order</button>
        </div>
      </div>
    `;
  });
}

displayFoods(data);

document.getElementById('search-bar').addEventListener('input', function () {
  const searchValue = this.value.toLowerCase();
  const filteredFoods = data.filter(food => food.name.toLowerCase().includes(searchValue));
  displayFoods(filteredFoods);
});
</script>
